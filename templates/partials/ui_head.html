<style>
        html {
            overflow-x: clip;
        }
        html, body {
            font-family: "Google Sans", ui-sans-serif, system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }
        .material-symbols-outlined {
            font-family: "Material Symbols Outlined";
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: "liga";
            -webkit-font-smoothing: antialiased;
        }
        body {
            background-color: #f8fafc; /* slate-50 */
        }
        /* Sidebar: expanded / collapsed rail (md+). --pw-sidebar-current drives width + main offset. */
        :root {
            --pw-sidebar-width-expanded: 12rem;
            --pw-sidebar-width-collapsed: 5.25rem;
            --pw-sidebar-current: var(--pw-sidebar-width-expanded);
            /* Single coordinated curve for the whole shell + per-element fades. */
            --pw-motion-shell: 320ms;
            --pw-motion-fade-out: 160ms;
            --pw-motion-fade-in: 260ms;
            --pw-motion-fast: 180ms;
            --pw-motion-drawer: 320ms;
            --pw-motion-ease: cubic-bezier(0.4, 0, 0.2, 1);
        }
        html[data-pw-sidebar="collapsed"] {
            --pw-sidebar-current: var(--pw-sidebar-width-collapsed);
        }
        /* Shell layout shifts: sidebar width + the page wrapper that follows it.
           Header `left` and content `padding-left` both consume --pw-sidebar-current,
           so transitioning them together keeps everything locked frame-for-frame. */
        .pw-sidebar {
            transition: width var(--pw-motion-shell) var(--pw-motion-ease);
            will-change: width;
        }
        .pw-page-below-header {
            transition: padding-left var(--pw-motion-shell) var(--pw-motion-ease);
        }
        header.pw-shell-header {
            transition: left var(--pw-motion-shell) var(--pw-motion-ease);
        }
        /* Module pill indicator slides between tabs and fades in on load. */
        .pw-module-tabs .pw-module-tabs-indicator {
            transition: transform var(--pw-motion-shell) var(--pw-motion-ease),
                width var(--pw-motion-shell) var(--pw-motion-ease),
                opacity var(--pw-motion-fade-in) var(--pw-motion-ease);
            will-change: transform, width, opacity;
        }
        .pw-module-tabs .pw-module-tab {
            transition: color var(--pw-motion-fast) var(--pw-motion-ease);
        }
        @media (min-width: 768px) {
            .pw-sidebar-link,
            .pw-sidebar-toggle {
                transition: background-color var(--pw-motion-fast) var(--pw-motion-ease),
                    color var(--pw-motion-fast) var(--pw-motion-ease),
                    border-color var(--pw-motion-fast) var(--pw-motion-ease),
                    gap var(--pw-motion-shell) var(--pw-motion-ease);
            }
            /* Labels: real fade + collapse-to-zero width so the icon truly centres. */
            .pw-sidebar-label {
                display: inline-block;
                max-width: 9rem;
                opacity: 1;
                overflow: hidden;
                white-space: nowrap;
                transition: max-width var(--pw-motion-shell) var(--pw-motion-ease),
                    opacity var(--pw-motion-fade-in) var(--pw-motion-ease) 60ms;
            }
            .pw-sidebar-module-heading {
                max-height: 5rem;
                opacity: 1;
                overflow: hidden;
                transition: max-height var(--pw-motion-shell) var(--pw-motion-ease),
                    opacity var(--pw-motion-fade-in) var(--pw-motion-ease) 60ms,
                    padding-top var(--pw-motion-shell) var(--pw-motion-ease),
                    padding-bottom var(--pw-motion-shell) var(--pw-motion-ease),
                    border-bottom-width var(--pw-motion-shell) var(--pw-motion-ease);
            }
            .pw-sidebar-brand-logo {
                max-width: 100%;
                transition: max-width var(--pw-motion-shell) var(--pw-motion-ease);
            }
            /* ---- Collapsed state ---- */
            /* Override expanded-state delays/durations so text fades OUT
               quickly, then width collapses behind it. */
            html[data-pw-sidebar="collapsed"] .pw-sidebar-label {
                max-width: 0;
                opacity: 0;
                transition: max-width var(--pw-motion-shell) var(--pw-motion-ease),
                    opacity var(--pw-motion-fade-out) var(--pw-motion-ease);
            }
            html[data-pw-sidebar="collapsed"] .pw-sidebar-module-heading {
                max-height: 0;
                opacity: 0;
                padding-top: 0;
                padding-bottom: 0;
                border-bottom-width: 0;
                transition: max-height var(--pw-motion-shell) var(--pw-motion-ease),
                    opacity var(--pw-motion-fade-out) var(--pw-motion-ease),
                    padding-top var(--pw-motion-shell) var(--pw-motion-ease),
                    padding-bottom var(--pw-motion-shell) var(--pw-motion-ease),
                    border-bottom-width var(--pw-motion-shell) var(--pw-motion-ease);
            }
            html[data-pw-sidebar="collapsed"] .pw-sidebar-brand-logo {
                max-width: 1.85rem;
            }
            html[data-pw-sidebar="collapsed"] .pw-sidebar-brand-row {
                padding-left: 0.25rem;
                padding-right: 0.25rem;
            }
            html[data-pw-sidebar="collapsed"] .pw-sidebar-brand-row .pw-sidebar-toggle {
                padding: 0.25rem;
            }
            html[data-pw-sidebar="collapsed"] .pw-sidebar-link {
                gap: 0;
                justify-content: center;
            }
            html[data-pw-sidebar="collapsed"] .pw-sidebar-toggle-text {
                display: none;
            }
        }
        /* Mobile nav drawer (slide-in + dim backdrop) */
        #pw-mobile-backdrop {
            transition: opacity var(--pw-motion-drawer) var(--pw-motion-ease),
                visibility 0s linear var(--pw-motion-drawer);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        body.pw-mobile-nav-open #pw-mobile-backdrop {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transition: opacity var(--pw-motion-drawer) var(--pw-motion-ease),
                visibility 0s linear 0s;
        }
        #pw-mobile-nav {
            transition: transform var(--pw-motion-drawer) var(--pw-motion-ease);
            transform: translate3d(-100%, 0, 0);
            will-change: transform;
            pointer-events: none;
            padding-left: env(safe-area-inset-left, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }
        .pw-scroll-x-touch {
            -webkit-overflow-scrolling: touch;
            overflow-x: auto;
        }
        body.pw-mobile-nav-open #pw-mobile-nav {
            transform: translate3d(0, 0, 0);
            pointer-events: auto;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 1px 2px rgba(31, 22, 53, 0.04), 0 4px 12px rgba(31, 22, 53, 0.04);
        }
        .glass-panel-elevated {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.65);
            box-shadow: 0 4px 18px rgba(31, 22, 53, 0.06), 0 1px 2px rgba(31, 22, 53, 0.04);
        }
        a { text-decoration: none; }
        a:focus-visible, button:focus-visible, input:focus-visible {
            outline: 2px solid rgba(103, 80, 164, 0.6);
            outline-offset: 2px;
            border-radius: 4px;
        }
        ::selection { background: rgba(103, 80, 164, 0.2); }

        /* ---- Per-module accent theme ----
           Defaults to a neutral blue. Module-specific accents below override
           via `body[data-pw-module="..."]`. Components consume these vars via
           Tailwind arbitrary values, e.g. `bg-[var(--pw-accent-soft)]`. */
        body {
            --pw-accent-soft: #eff6ff;     /* bg tint for soft chips / nav */
            --pw-accent-strong: #1d4ed8;   /* text / heading on soft tint */
            --pw-accent-icon: #2563eb;     /* icon color */
            --pw-accent-border: #bfdbfe;   /* soft border */
            --pw-accent-ring: rgba(59, 130, 246, 0.45); /* focus ring */
            --pw-accent-grad: linear-gradient(90deg, #3b82f6 0%, #6366f1 100%);
        }
        body[data-pw-module="in_person"] {
            --pw-accent-soft: #f7fee7;     /* lime-50 */
            --pw-accent-strong: #4d7c0f;   /* lime-700 */
            --pw-accent-icon: #65a30d;     /* lime-600 */
            --pw-accent-border: #d9f99d;   /* lime-200 */
            --pw-accent-ring: rgba(132, 204, 22, 0.5); /* lime-500 */
            --pw-accent-grad: linear-gradient(90deg, #84cc16 0%, #facc15 100%);
        }
        body[data-pw-module="virtual"] {
            --pw-accent-soft: #f5f3ff;     /* violet-50 */
            --pw-accent-strong: #6d28d9;   /* violet-700 */
            --pw-accent-icon: #7c3aed;     /* violet-600 */
            --pw-accent-border: #ddd6fe;   /* violet-200 */
            --pw-accent-ring: rgba(167, 139, 250, 0.5);
            --pw-accent-grad: linear-gradient(90deg, #f0abfc 0%, #c4b5fd 50%, #7dd3fc 100%);
        }
        body[data-pw-module="bootcamps"] {
            --pw-accent-soft: #fffbeb;     /* amber-50 */
            --pw-accent-strong: #c2410c;   /* orange-700 */
            --pw-accent-icon: #ea580c;     /* orange-600 */
            --pw-accent-border: #fed7aa;   /* orange-200 */
            --pw-accent-ring: rgba(251, 146, 60, 0.5);
            --pw-accent-grad: linear-gradient(90deg, #fde68a 0%, #fb923c 55%, #f97316 100%);
        }

        @media (prefers-reduced-motion: reduce) {
            :root {
                --pw-motion-shell: 1ms;
                --pw-motion-fade-out: 1ms;
                --pw-motion-fade-in: 1ms;
                --pw-motion-fast: 1ms;
                --pw-motion-drawer: 1ms;
            }
            *,
            *::before,
            *::after {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
                transition-delay: 0s !important;
                animation-delay: 0s !important;
            }
        }
    </style>
<script>
(function () {
  try {
    if (localStorage.getItem("pw_sidebar_collapsed") === "1") {
      document.documentElement.setAttribute("data-pw-sidebar", "collapsed");
    }
  } catch (_e) {}
})();
</script>
